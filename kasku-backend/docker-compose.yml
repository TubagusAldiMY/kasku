name: kasku

# ==============================================================
# KasKu SaaS — Docker Compose (Production Base)
# Usage:
#   Local dev  : docker compose up -d          (uses override.yml automatically)
#   Production : docker compose -f docker-compose.yml up -d
# ==============================================================

networks:
  kasku-public:
    name: kasku-public
    driver: bridge
  kasku-internal:
    name: kasku-internal
    driver: bridge
  kasku-data:
    name: kasku-data
    driver: bridge
  kasku-admin:
    name: kasku-admin
    driver: bridge

volumes:
  pgdata:
    name: kasku-pgdata
  rabbitmq-data:
    name: kasku-rabbitmq-data
  redis-data:
    name: kasku-redis-data
  traefik-certs:
    name: kasku-traefik-certs

services:

  # ============================================================
  # Traefik — TLS termination + reverse proxy
  # ============================================================
  traefik:
    image: traefik:v3.0
    container_name: kasku-traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=kasku-public"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/certs
    networks:
      - kasku-public
    stop_grace_period: 35s
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================
  # PostgreSQL 16 — 5 databases, schema-per-tenant for finance
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: kasku-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: kasku_superuser
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASS}
      POSTGRES_DB: kasku_auth
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - kasku-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kasku_superuser -d kasku_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    stop_grace_period: 35s

  # ============================================================
  # Redis 7 — Rate limiting counters + JWT blacklist
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: kasku-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - kasku-data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    stop_grace_period: 35s

  # ============================================================
  # RabbitMQ 3.13 — Async event bus
  # Exchange: kasku.events (topic, durable)
  # DLX:      kasku.events.dlx (fanout, durable)
  # DLQ:      kasku.events.dlq
  # ============================================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: kasku-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - kasku-data
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    stop_grace_period: 35s

  # ============================================================
  # Application services — added per task (Phase 1 MVP)
  #
  # Task 1:  auth-service        :8081 / gRPC :9081   kasku-internal + kasku-data
  # Task 2:  api-gateway         :8080                kasku-public + kasku-internal + kasku-admin + kasku-data
  # Task 3:  user-service        :8082 / gRPC :9082   kasku-internal + kasku-data
  # Task 4:  billing-service     :8083 / gRPC :9083   kasku-internal + kasku-data
  # Task 5:  finance-service     :8084 / gRPC :9084   kasku-internal + kasku-data
  # Task 6:  transaction-service :8085 / gRPC :9085   kasku-internal + kasku-data
  # Task 7:  notification-service :8089                kasku-internal + kasku-data
  # Phase 2:
  # Task 8:  investment-service  :8086 / gRPC :9086   kasku-internal + kasku-data
  # Task 9:  price-service       :8087 / gRPC :9087   kasku-internal + kasku-data
  # Task 10: sync-service        :8088                 kasku-internal + kasku-data
  # ============================================================

  # ============================================================
  # auth-service
  # ============================================================
  auth-service:
    build: ./auth-service
    container_name: kasku-auth-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8081"
      GRPC_PORT: "9081"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgres://kasku_auth_svc:${KASKU_AUTH_DB_PASS}@postgres:5432/kasku_auth?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # api-gateway
  # ============================================================
  api-gateway:
    build: ./api-gateway
    container_name: kasku-api-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8080"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      BILLING_GRPC_ADDR: kasku-billing-service:9083
      AUTH_SERVICE_URL: http://kasku-auth-service:8081
      USER_SERVICE_URL: http://kasku-user-service:8082
      BILLING_SERVICE_URL: http://kasku-billing-service:8083
      FINANCE_SERVICE_URL: http://kasku-finance-service:8084
      TRANSACTION_SERVICE_URL: http://kasku-transaction-service:8085
      INVESTMENT_SERVICE_URL: http://kasku-investment-service:8086
      SYNC_SERVICE_URL: http://kasku-sync-service:8088
    networks:
      - kasku-public
      - kasku-internal
      - kasku-admin
      - kasku-data
    depends_on:
      auth-service:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.kasku.app`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # user-service
  # ============================================================
  user-service:
    build: ./user-service
    container_name: kasku-user-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8082"
      GRPC_PORT: "9082"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_FINANCE_DSN: ${POSTGRES_FINANCE_DSN}
      POSTGRES_BILLING_DSN: ${POSTGRES_BILLING_DSN}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      billing-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # billing-service
  # ============================================================
  billing-service:
    build: ./billing-service
    container_name: kasku-billing-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8083"
      GRPC_PORT: "9083"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgres://kasku_billing_svc:${KASKU_BILLING_DB_PASS}@postgres:5432/kasku_billing?sslmode=disable
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # finance-service
  # ============================================================
  finance-service:
    build: ./finance-service
    container_name: kasku-finance-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8084"
      GRPC_PORT: "9084"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgres://kasku_finance_svc:${KASKU_FINANCE_DB_PASS}@postgres:5432/kasku_finance?sslmode=disable
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # transaction-service
  # ============================================================
  transaction-service:
    build: ./transaction-service
    container_name: kasku-transaction-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8085"
      GRPC_PORT: "9085"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgres://kasku_transaction_svc:${KASKU_TRANSACTION_DB_PASS}@postgres:5432/kasku_finance?sslmode=disable
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # notification-service
  # ============================================================
  notification-service:
    build: ./notification-service
    container_name: kasku-notification-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8089"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@kasku.app}
      APP_BASE_URL: ${APP_BASE_URL:-https://kasku.app}
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8089/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # Phase 2 — investment-service
  # ============================================================
  investment-service:
    build: ./investment-service
    container_name: kasku-investment-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8086"
      GRPC_PORT: "9086"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgres://kasku_investment_svc:${KASKU_INVESTMENT_DB_PASS}@postgres:5432/kasku_finance?sslmode=disable
      PRICE_GRPC_ADDR: kasku-price-service:9087
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
      price-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # Phase 2 — price-service (Rust)
  # ============================================================
  price-service:
    build: ./price-service
    container_name: kasku-price-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HTTP_PORT: "8087"
      GRPC_PORT: "9087"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://kasku_price_svc:${KASKU_PRICE_DB_PASS}@postgres:5432/kasku_price?sslmode=disable
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      PRICE_CACHE_TTL_SECONDS: ${PRICE_CACHE_TTL_SECONDS:-900}
      EXTERNAL_REQUEST_TIMEOUT_SECONDS: ${EXTERNAL_REQUEST_TIMEOUT_SECONDS:-10}
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 35s

  # ============================================================
  # Phase 2 — sync-service (Rust)
  # ============================================================
  sync-service:
    build: ./sync-service
    container_name: kasku-sync-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HTTP_PORT: "8088"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://kasku_sync_svc:${KASKU_SYNC_DB_PASS}@postgres:5432/kasku_finance?sslmode=disable
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 35s
