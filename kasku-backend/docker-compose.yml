name: kasku

# ==============================================================
# KasKu SaaS — Docker Compose (Production Base)
# Usage:
#   Local dev  : docker compose up -d          (uses override.yml automatically)
#   Production : docker compose -f docker-compose.yml up -d
# ==============================================================

networks:
  kasku-public:
    name: kasku-public
    driver: bridge
  kasku-internal:
    name: kasku-internal
    driver: bridge
  kasku-data:
    name: kasku-data
    driver: bridge
  kasku-admin:
    name: kasku-admin
    driver: bridge

volumes:
  pgdata:
    name: kasku-pgdata
  rabbitmq-data:
    name: kasku-rabbitmq-data
  redis-data:
    name: kasku-redis-data
  traefik-certs:
    name: kasku-traefik-certs
  prometheus-data:
    name: kasku-prometheus-data
  grafana-data:
    name: kasku-grafana-data
  loki-data:
    name: kasku-loki-data
  alertmanager-data:
    name: kasku-alertmanager-data
  jaeger-data:
    name: kasku-jaeger-data

services:

  # ============================================================
  # Traefik — TLS termination + reverse proxy
  # ============================================================
  traefik:
    image: traefik:v3.0
    container_name: kasku-traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=kasku-public"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - kasku-public
    stop_grace_period: 35s
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================
  # PostgreSQL 16 — 5 databases, schema-per-tenant for finance
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: kasku-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: kasku_superuser
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASS}
      POSTGRES_DB: kasku_auth
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - kasku-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kasku_superuser -d kasku_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    stop_grace_period: 35s

  # ============================================================
  # Redis 7 — Rate limiting counters + JWT blacklist
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: kasku-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - kasku-data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    stop_grace_period: 35s

  # ============================================================
  # RabbitMQ 3.13 — Async event bus
  # Exchange: kasku.events (topic, durable)
  # DLX:      kasku.events.dlx (fanout, durable)
  # DLQ:      kasku.events.dlq
  # ============================================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: kasku-rabbitmq
    restart: unless-stopped
    entrypoint: ["sh", "/etc/rabbitmq/entrypoint.sh"]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      # Aktifkan Prometheus plugin built-in agar Prometheus bisa scrape :15692/metrics.
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_management_agent disable_metrics_collector false"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./infra/rabbitmq/entrypoint.sh:/etc/rabbitmq/entrypoint.sh:ro
    networks:
      - kasku-data
      - kasku-admin   # untuk discovery dari Prometheus di profile observability
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    stop_grace_period: 35s

  # ============================================================
  # Application services — added per task (Phase 1 MVP)
  #
  # Task 1:  auth-service        :8081 / gRPC :9081   kasku-internal + kasku-data
  # Task 2:  api-gateway         :8080                kasku-public + kasku-internal + kasku-admin + kasku-data
  # Task 3:  user-service        :8082 / gRPC :9082   kasku-internal + kasku-data
  # Task 4:  billing-service     :8083 / gRPC :9083   kasku-internal + kasku-data
  # Task 5:  finance-service     :8084 / gRPC :9084   kasku-internal + kasku-data
  # Task 6:  transaction-service :8085 / gRPC :9085   kasku-internal + kasku-data
  # Task 7:  notification-service :8089                kasku-internal + kasku-data
  # Phase 2:
  # Task 8:  investment-service  :8086 / gRPC :9086   kasku-internal + kasku-data
  # Task 9:  price-service       :8087 / gRPC :9087   kasku-internal + kasku-data
  # Task 10: sync-service        :8088                 kasku-internal + kasku-data
  # Task 11: admin-service       :8090                 kasku-admin only
  # ============================================================

  # ============================================================
  # auth-service
  # ============================================================
  auth-service:
    image: ghcr.io/tubagusaldimy/kasku-auth-service:${KASKU_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    container_name: kasku-auth-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8081"
      GRPC_PORT: "9081"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgres://kasku_auth_svc:${KASKU_AUTH_DB_PASS}@postgres:5432/kasku_auth?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      INTERNAL_GRPC_SECRET: ${INTERNAL_GRPC_SECRET:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # api-gateway
  # ============================================================
  api-gateway:
    image: ghcr.io/tubagusaldimy/kasku-api-gateway:${KASKU_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    container_name: kasku-api-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8080"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      BILLING_GRPC_ADDR: kasku-billing-service:9083
      AUTH_SERVICE_URL: http://kasku-auth-service:8081
      USER_SERVICE_URL: http://kasku-user-service:8082
      BILLING_SERVICE_URL: http://kasku-billing-service:8083
      FINANCE_SERVICE_URL: http://kasku-finance-service:8084
      TRANSACTION_SERVICE_URL: http://kasku-transaction-service:8085
      INVESTMENT_SERVICE_URL: http://kasku-investment-service:8086
      PRICE_SERVICE_URL: http://kasku-price-service:8087
      SYNC_SERVICE_URL: http://kasku-sync-service:8088
      NOTIFICATION_SERVICE_URL: http://kasku-notification-service:8089
      ADMIN_SERVICE_URL: http://kasku-admin-service:8090
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    networks:
      - kasku-public
      - kasku-internal
      - kasku-admin
      - kasku-data
    depends_on:
      auth-service:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${KASKU_API_DOMAIN:-api.kasku.app}`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # user-service
  # ============================================================
  user-service:
    image: ghcr.io/tubagusaldimy/kasku-user-service:${KASKU_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    container_name: kasku-user-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8082"
      GRPC_PORT: "9082"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_FINANCE_DSN: postgres://kasku_user_svc:${KASKU_USER_DB_PASS}@postgres:5432/kasku_finance?sslmode=disable
      POSTGRES_BILLING_DSN: postgres://kasku_user_svc:${KASKU_USER_DB_PASS}@postgres:5432/kasku_billing?sslmode=disable
      POSTGRES_USER_DSN: postgres://kasku_user_svc:${KASKU_USER_DB_PASS}@postgres:5432/kasku_user?sslmode=disable
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      billing-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # billing-service
  # ============================================================
  billing-service:
    image: ghcr.io/tubagusaldimy/kasku-billing-service:${KASKU_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: ./billing-service/Dockerfile
    container_name: kasku-billing-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8083"
      GRPC_PORT: "9083"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgres://kasku_billing_svc:${KASKU_BILLING_DB_PASS}@postgres:5432/kasku_billing?sslmode=disable
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      PAYMENT_ORCHESTRATOR_BASE_URL: https://api-payment.roemahprogram.com
      PAYMENT_ORCHESTRATOR_API_KEY: ${KASKU_PAYMENT_ORCHESTRATOR_API_KEY}
      PAYMENT_WEBHOOK_SECRET: ${KASKU_PAYMENT_WEBHOOK_SECRET}
      PAYMENT_CALLBACK_BASE_URL: ${KASKU_PAYMENT_CALLBACK_BASE_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # finance-service
  # ============================================================
  finance-service:
    image: ghcr.io/tubagusaldimy/kasku-finance-service:${KASKU_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: ./finance-service/Dockerfile
    container_name: kasku-finance-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8084"
      GRPC_PORT: "9084"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgres://kasku_finance_svc:${KASKU_FINANCE_DB_PASS}@postgres:5432/kasku_finance?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # transaction-service
  # ============================================================
  transaction-service:
    image: ghcr.io/tubagusaldimy/kasku-transaction-service:${KASKU_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: ./transaction-service/Dockerfile
    container_name: kasku-transaction-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8085"
      GRPC_PORT: "9085"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgres://kasku_transaction_svc:${KASKU_TRANSACTION_DB_PASS}@postgres:5432/kasku_finance?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # notification-service
  # ============================================================
  notification-service:
    image: ghcr.io/tubagusaldimy/kasku-notification-service:${KASKU_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: ./notification-service/Dockerfile
    container_name: kasku-notification-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8089"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgres://kasku_notification_svc:${KASKU_NOTIFICATION_DB_PASS}@postgres:5432/kasku_notification?sslmode=disable
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@kasku.app}
      APP_BASE_URL: ${APP_BASE_URL:-https://kasku.app}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8089/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # Phase 2 — investment-service
  # ============================================================
  investment-service:
    image: ghcr.io/tubagusaldimy/kasku-investment-service:${KASKU_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: ./investment-service/Dockerfile
    container_name: kasku-investment-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8086"
      GRPC_PORT: "9086"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_DSN: postgres://kasku_investment_svc:${KASKU_INVESTMENT_DB_PASS}@postgres:5432/kasku_finance?sslmode=disable
      PRICE_GRPC_ADDR: kasku-price-service:9087
      PRICE_HTTP_URL: http://kasku-price-service:8087
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_healthy
      price-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # Phase 2 — price-service (Rust)
  # ============================================================
  price-service:
    image: ghcr.io/tubagusaldimy/kasku-price-service:${KASKU_IMAGE_TAG:-latest}
    build: ./price-service
    container_name: kasku-price-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HTTP_PORT: "8087"
      GRPC_PORT: "9087"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://kasku_price_svc:${KASKU_PRICE_DB_PASS}@postgres:5432/kasku_price?sslmode=disable
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      PRICE_CACHE_TTL_SECONDS: ${PRICE_CACHE_TTL_SECONDS:-900}
      EXTERNAL_REQUEST_TIMEOUT_SECONDS: ${EXTERNAL_REQUEST_TIMEOUT_SECONDS:-10}
      GOLD_USD_IDR_RATE: ${GOLD_USD_IDR_RATE:-16000}
      METALS_LIVE_URL: ${METALS_LIVE_URL:-https://api.metals.live/v1/spot/gold}
      PRICE_SCHEDULER_SYMBOLS: ${PRICE_SCHEDULER_SYMBOLS:-bitcoin,ethereum,XAU}
      PRICE_SCHEDULER_INTERVAL_SECONDS: ${PRICE_SCHEDULER_INTERVAL_SECONDS:-900}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 35s

  # ============================================================
  # Phase 2 — sync-service (Rust)
  # ============================================================
  sync-service:
    image: ghcr.io/tubagusaldimy/kasku-sync-service:${KASKU_IMAGE_TAG:-latest}
    build: ./sync-service
    container_name: kasku-sync-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HTTP_PORT: "8088"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://kasku_sync_svc:${KASKU_SYNC_DB_PASS}@postgres:5432/kasku_finance?sslmode=disable
      FINANCE_SERVICE_GRPC_ADDR: http://kasku-finance-service:9084
      TRANSACTION_SERVICE_GRPC_ADDR: http://kasku-transaction-service:9085
      INVESTMENT_SERVICE_GRPC_ADDR: http://kasku-investment-service:9086
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    networks:
      - kasku-internal
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
      finance-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy
      investment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 35s

  # ============================================================
  # Admin service — internal admin network only
  # ============================================================
  admin-service:
    image: ghcr.io/tubagusaldimy/kasku-admin-service:${KASKU_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: ./admin-service/Dockerfile
    container_name: kasku-admin-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_PORT: "8090"
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Cross-DB credential — admin-service membonceng credential service pemilik.
      # Lihat admin-service/README.md untuk trade-off-nya.
      POSTGRES_ADMIN_DSN: postgres://kasku_admin_svc:${KASKU_ADMIN_DB_PASS}@postgres:5432/kasku_admin?sslmode=disable
      POSTGRES_AUTH_ADMIN_DSN: postgres://kasku_auth_svc:${KASKU_AUTH_DB_PASS}@postgres:5432/kasku_auth?sslmode=disable
      POSTGRES_BILLING_ADMIN_DSN: postgres://kasku_billing_svc:${KASKU_BILLING_DB_PASS}@postgres:5432/kasku_billing?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_JWT_TTL: ${ADMIN_JWT_TTL:-8h}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-superadmin}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD}
      ARGON2_TIME: ${ARGON2_TIME:-3}
      ARGON2_MEMORY_KB: ${ARGON2_MEMORY_KB:-65536}
      ARGON2_THREADS: ${ARGON2_THREADS:-4}
      ARGON2_KEY_LENGTH: ${ARGON2_KEY_LENGTH:-32}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    networks:
      - kasku-admin
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # Frontend (SvelteKit / Node.js)
  # ============================================================
  frontend:
    image: ghcr.io/tubagusaldimy/kasku-frontend:${KASKU_IMAGE_TAG:-latest}
    build:
      context: ../kasku-frontend
      dockerfile: Dockerfile
      args:
        PUBLIC_API_BASE_URL: https://${KASKU_API_DOMAIN:-api.kasku.id}/v1
    container_name: kasku-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
    networks:
      - kasku-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${APP_DOMAIN:-app.kasku.id}`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 35s

  # ============================================================
  # Observability stack — internal/admin profile only
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: kasku-prometheus
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - kasku-admin
      - kasku-internal
      - kasku-data
    stop_grace_period: 35s

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: kasku-alertmanager
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - kasku-admin
    stop_grace_period: 35s

  loki:
    image: grafana/loki:3.1.1
    container_name: kasku-loki
    restart: unless-stopped
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - kasku-admin
    stop_grace_period: 35s

  promtail:
    image: grafana/promtail:3.1.1
    container_name: kasku-promtail
    restart: unless-stopped
    profiles: ["observability"]
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - kasku-admin
    depends_on:
      - loki
    stop_grace_period: 35s

  grafana:
    image: grafana/grafana:11.1.4
    container_name: kasku-grafana
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_this_grafana_pass}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards-json:/var/lib/grafana/dashboards:ro
    networks:
      - kasku-admin
    depends_on:
      - prometheus
      - loki
    stop_grace_period: 35s

  # ── Jaeger — distributed tracing UI + storage ────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: kasku-jaeger
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    ports:
      - "127.0.0.1:16686:16686"   # Jaeger UI
    volumes:
      - jaeger-data:/badger
    networks:
      - kasku-admin
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    stop_grace_period: 35s

  # ── OTEL Collector — receives OTLP from services, forwards to Jaeger ──
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: kasku-otel-collector
    restart: unless-stopped
    profiles: ["observability"]
    command: ["--config=/etc/otelcol/config.yaml"]
    environment:
      APP_ENV: ${APP_ENV:-production}
    volumes:
      - ./infra/otelcollector/otelcollector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"   # OTLP/gRPC — services
      - "127.0.0.1:4318:4318"   # OTLP/HTTP — frontend browser
    networks:
      - kasku-admin
      - kasku-internal
    depends_on:
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:13133/health/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 35s

  # ============================================================
  # Backup — jalankan manual atau via cron dengan profile backup
  # Cron production: 0 2 * * * docker compose --profile backup run --rm backup
  # ============================================================
  backup:
    image: postgres:16-alpine
    profiles: ["backup"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_SUPERUSER: kasku_superuser
    volumes:
      - ./infra/backup/backup.sh:/backup.sh:ro
    entrypoint: ["sh", "/backup.sh"]
    networks:
      - kasku-data
    depends_on:
      postgres:
        condition: service_healthy
