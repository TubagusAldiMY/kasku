# ==============================================================
# KasKu SaaS — Docker Compose Override (Local Development)
# Applied automatically by `docker compose up -d`.
# NOT used in production (run with -f docker-compose.yml only).
#
# Exposes infra ports directly so developers can connect with
# pgAdmin, redis-cli, RabbitMQ Management UI, etc.
# ==============================================================

services:

  postgres:
    ports:
      - "5433:5432"   # mapped to 5433 locally (5432 used by host/existing Postgres)

  redis:
    ports:
      - "6380:6379"   # mapped to 6380 locally (6379 used by host Redis)

  rabbitmq:
    ports:
      - "5672:5672"    # AMQP — Go/Rust services
      - "15672:15672"  # Management UI — http://localhost:15672

  # Expose api-gateway so the frontend dev server (browser) can reach localhost:8080
  api-gateway:
    ports:
      - "8080:8080"

  # Expose sync-service so integration smoke test (sync_smoke.sh) bisa fetch /metrics
  # langsung tanpa lewat docker exec. Internal-only di production.
  sync-service:
    ports:
      - "8088:8088"

  # notification-service: gunakan SMTP sungguhan di local dev
  # (APP_ENV=development di .env global → NoOpSender; override ke production supaya email terkirim)
  notification-service:
    environment:
      APP_ENV: production
      APP_BASE_URL: http://localhost:5173

  # Disable Traefik in local dev (services expose ports directly via override)
  traefik:
    profiles:
      - production
