name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Build, push, and deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          MISSING=()
          for secret in \
            DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH \
            KASKU_AUTH_DB_PASS KASKU_BILLING_DB_PASS KASKU_FINANCE_DB_PASS \
            KASKU_PRICE_DB_PASS KASKU_ADMIN_DB_PASS KASKU_USER_DB_PASS \
            KASKU_SYNC_DB_PASS KASKU_INVESTMENT_DB_PASS \
            JWT_PRIVATE_KEY JWT_PUBLIC_KEY \
            RABBITMQ_PASS REDIS_PASSWORD \
            MIDTRANS_SERVER_KEY; do
            if [[ -z "${!secret:-}" ]]; then
              MISSING+=("$secret")
            fi
          done
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "ERROR: Secret berikut belum dikonfigurasi di GitHub repo settings:"
            printf '  - %s\n' "${MISSING[@]}"
            exit 1
          fi
          echo "Semua required secrets tersedia"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          KASKU_AUTH_DB_PASS: ${{ secrets.KASKU_AUTH_DB_PASS }}
          KASKU_BILLING_DB_PASS: ${{ secrets.KASKU_BILLING_DB_PASS }}
          KASKU_FINANCE_DB_PASS: ${{ secrets.KASKU_FINANCE_DB_PASS }}
          KASKU_PRICE_DB_PASS: ${{ secrets.KASKU_PRICE_DB_PASS }}
          KASKU_ADMIN_DB_PASS: ${{ secrets.KASKU_ADMIN_DB_PASS }}
          KASKU_USER_DB_PASS: ${{ secrets.KASKU_USER_DB_PASS }}
          KASKU_SYNC_DB_PASS: ${{ secrets.KASKU_SYNC_DB_PASS }}
          KASKU_INVESTMENT_DB_PASS: ${{ secrets.KASKU_INVESTMENT_DB_PASS }}
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
          RABBITMQ_PASS: ${{ secrets.RABBITMQ_PASS }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          MIDTRANS_SERVER_KEY: ${{ secrets.MIDTRANS_SERVER_KEY }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Go services
        run: |
          GO_SERVICES=(
            api-gateway
            auth-service
            user-service
            billing-service
            finance-service
            transaction-service
            notification-service
            investment-service
            admin-service
          )
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA="${{ github.sha }}"
          for svc in "${GO_SERVICES[@]}"; do
            IMAGE="ghcr.io/${OWNER}/kasku-${svc}"
            docker build \
              -t "${IMAGE}:latest" \
              -t "${IMAGE}:${SHA}" \
              "kasku-backend/${svc}/"
            docker push "${IMAGE}" --all-tags
          done

      - name: Build & push Rust services
        run: |
          RUST_SERVICES=(price-service sync-service)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA="${{ github.sha }}"
          for svc in "${RUST_SERVICES[@]}"; do
            IMAGE="ghcr.io/${OWNER}/kasku-${svc}"
            docker build \
              -t "${IMAGE}:latest" \
              -t "${IMAGE}:${SHA}" \
              "kasku-backend/${svc}/"
            docker push "${IMAGE}" --all-tags
          done

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Tarik semua image terbaru
            docker compose -f docker-compose.yml pull

            # Rolling restart — --remove-orphans membersihkan container lama
            docker compose -f docker-compose.yml up -d --remove-orphans

            # Tunggu semua service healthy (max 120s) via smoke test
            echo "Menunggu semua service healthy..."
            if ! timeout 120 bash -c \
              'until bash tests/integration/smoke.sh > /dev/null 2>&1; do
                echo "  ... belum healthy, tunggu 5s"
                sleep 5
              done'; then
              echo "ERROR: Service tidak healthy setelah 120s"
              docker compose -f docker-compose.yml ps
              docker compose -f docker-compose.yml logs --tail=50
              exit 1
            fi

            echo "Semua service healthy"
