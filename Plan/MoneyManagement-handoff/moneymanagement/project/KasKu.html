  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      /* background set dynamically by applyTheme() */
      background: #111318;
      color: #e8f0fe;
      overflow-x: hidden;
    }

    #root { min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(128,128,180,0.2); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(128,128,255,0.3); }

    /* Mobile FAB */
    @media (max-width: 767px) { .fab-wrapper { display: block !important; } }

    /* Input focus — Gemini accent */
    input:focus, select:focus, textarea:focus {
      border-color: rgba(66,133,244,0.5) !important;
      box-shadow: 0 0 0 3px rgba(66,133,244,0.08) !important;
      outline: none !important;
    }

    /* Dark select options */
    option { background: #0c1522; color: #e8f0fe; }

    /* Light mode option override */
    body.light option { background: #ffffff; color: #111827; }

    /* Transitions — smooth theme switch */
    * {
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.15s ease,
                  box-shadow 0.2s ease;
    }
    button {
      transition: background 0.15s ease, transform 0.1s ease, opacity 0.12s ease,
                  border-color 0.15s ease !important;
      font-family: inherit;
    }
    button:active { transform: scale(0.97) !important; }

    /* Number input — hide arrows */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* Date picker icon */
    input[type=date]::-webkit-calendar-picker-indicator {
      filter: invert(0.5) sepia(0.2);
      cursor: pointer;
      opacity: 0.7;
    }

    /* Gradient text — ensure it works */
    .grad-text {
      background: linear-gradient(135deg, #4285f4 0%, #9b5de5 45%, #f15bb5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
