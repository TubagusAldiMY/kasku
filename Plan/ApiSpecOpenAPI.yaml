        - name: symbols
          in: query
          description: "Comma-separated list symbol. Contoh: BTC,ETH,XAU"
          schema:
            type: string
          example: "BTC,ETH,XAU"
      responses:
        '200':
          description: Harga terkini
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AssetPrice'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ============================================================
  # Dashboard Endpoint
  # ============================================================

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Ringkasan keuangan user
      description: |
        Mengembalikan agregat: total saldo, total investasi, income/expense bulan ini,
        dan informasi penggunaan tier limit.
      operationId: getDashboard
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DashboardResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ============================================================
  # Sync Endpoints
  # ============================================================

  /sync/batch:
    post:
      tags: [Sync]
      summary: Push offline changes ke server
      description: |
        Mengirimkan semua perubahan yang dilakukan saat offline ke server (sync-service).
        Server menjalankan conflict resolution (Server Wins) untuk setiap record yang konflik.
        Tier limit di-enforce di sini — record yang melebihi limit dikembalikan dalam
        `tier_limit_rejected` array.
      operationId: syncBatch
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncPushRequest'
      responses:
        '200':
          description: Sync berhasil diproses
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SyncPushResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '413':
          description: Batch size melebihi limit (maksimal 500 record)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /sync/pull:
    get:
      tags: [Sync]
      summary: Pull perubahan terbaru dari server
      description: |
        Mengambil semua data terbaru dari server sejak `since` timestamp.
        Digunakan setelah client kembali online untuk mendapatkan perubahan dari device lain.
      operationId: syncPull
      security:
        - BearerAuth: []
      parameters:
        - name: since
          in: query
          description: "ISO 8601 timestamp. Data yang diubah setelah timestamp ini akan dikembalikan."
          schema:
            type: string
            format: date-time
          example: "2026-04-26T08:00:00Z"
      responses:
        '200':
          description: Data terbaru berhasil diambil
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SyncPullResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # ============================================================
  # Admin Endpoints
  # ============================================================

  /admin/auth/login:
    post:
      tags: [Admin]
      summary: Admin login
      description: |
        Login untuk admin dashboard. Menggunakan credential admin (terpisah dari user credential).
        Endpoint ini ada di network terpisah (kasku-admin) dan tidak accessible dari public.
      operationId: adminLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Login admin berhasil
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminLoginResponse'
        '401':
          description: Username atau password admin salah
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users:
    get:
      tags: [Admin]
      summary: Daftar semua user (platform-level)
      operationId: adminListUsers
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          description: Filter by status akun
          schema:
            type: string
            enum: [active, inactive, suspended]
        - name: plan
          in: query
          description: Filter by subscription plan
          schema:
            type: string
            enum: [FREE, BASIC, PRO]
        - name: email
          in: query
          description: Search by email (partial match)
          schema:
            type: string
      responses:
        '200':
          description: Daftar semua user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AdminUserListItem'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /admin/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: User ID

    get:
      tags: [Admin]
      summary: Detail user (admin view)
      description: Termasuk subscription aktif, usage stats, dan riwayat pembayaran terakhir.
      operationId: adminGetUserDetail
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Detail user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminUserDetail'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /admin/users/{id}/suspend:
    post:
      tags: [Admin]
      summary: Suspend user
      description: Menonaktifkan akun user. Semua session aktif akan diinvalidasi.
      operationId: adminSuspendUser
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuspendUserRequest'
      responses:
        '200':
          description: User berhasil di-suspend
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                            example: "User berhasil di-suspend."
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /admin/users/{id}/activate:
    post:
      tags: [Admin]
      summary: Activate suspended user
      operationId: adminActivateUser
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User berhasil diaktifkan kembali
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                            example: "User berhasil diaktifkan."
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /admin/users/{id}/subscription:
    put:
      tags: [Admin]
      summary: Override subscription plan user
      description: |
        Admin dapat mengubah subscription plan user secara manual (tanpa payment).
        Digunakan untuk kompensasi, uji coba, atau koreksi data.
        Semua override dicatat di audit log.
      operationId: adminOverrideSubscription
      security:
        - AdminBearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OverrideSubscriptionRequest'
      responses:
        '200':
          description: Subscription berhasil di-override
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /admin/stats:
    get:
      tags: [Admin]
      summary: Platform statistics
      description: |
        Statistik platform: total user, MRR, active subscriptions, churn rate.
        Data di-compute saat request (tidak di-cache).
      operationId: adminGetPlatformStats
      security:
        - AdminBearerAuth: []
      responses:
        '200':
          description: Platform statistics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PlatformStats'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /admin/payments:
    get:
      tags: [Admin]
      summary: Riwayat semua pembayaran (platform-level)
      operationId: adminListPayments
      security:
        - AdminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, SETTLEMENT, EXPIRE, CANCEL, DENY, REFUND, FAILURE]
        - name: start_date
          in: query
          schema:
            type: string
            format: date
          example: "2026-04-01"
        - name: end_date
          in: query
          schema:
            type: string
            format: date
          example: "2026-04-30"
      responses:
        '200':
          description: Daftar semua pembayaran
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          allOf:
                            - $ref: '#/components/schemas/Invoice'
                            - type: object
                              properties:
                                user_id:
                                  type: string
                                  format: uuid
                                user_email:
                                  type: string
                                  format: email
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  # ============================================================
  # Health Check
  # ============================================================

  /health:
    get:
      tags: [Health]
      summary: Health check (api-gateway aggregate)
      description: |
        Mengecek health semua downstream service. api-gateway mem-probe setiap
        service via GET /health dan mengagregasi hasilnya.
        Tidak perlu autentikasi.
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Semua service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Satu atau lebih service unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: "degraded"
                version: "2.0.0"
                timestamp: "2026-04-27T10:00:00Z"
                services:
                  auth-service: "healthy"
                  billing-service: "healthy"
                  price-service: "unhealthy"
                  notification-service: "healthy"
