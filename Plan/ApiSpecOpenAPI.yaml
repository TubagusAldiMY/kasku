  # ============================================================
  # Billing Service Endpoints
  # ============================================================

  /billing/plans:
    get:
      tags: [Billing]
      summary: Daftar semua subscription plans
      description: Endpoint publik. Tidak perlu autentikasi.
      operationId: listSubscriptionPlans
      responses:
        '200':
          description: Daftar subscription plans
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/SubscriptionPlan'

  /billing/subscription:
    get:
      tags: [Billing]
      summary: Subscription aktif user saat ini
      operationId: getMySubscription
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Subscription aktif
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /billing/subscribe:
    post:
      tags: [Billing]
      summary: Subscribe ke plan berbayar
      description: |
        Membuat sesi pembayaran Midtrans untuk upgrade ke plan BASIC atau PRO.
        Mengembalikan Snap token dan redirect URL untuk proses pembayaran di frontend.
      operationId: subscribeToPlan
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
      responses:
        '201':
          description: Sesi pembayaran berhasil dibuat
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SubscribeResponse'
        '400':
          description: Tidak dapat subscribe ke plan FREE atau plan yang sama
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          $ref: '#/components/responses/ValidationError'

  /billing/cancel:
    post:
      tags: [Billing]
      summary: Cancel subscription
      description: |
        Membatalkan subscription aktif. Akses tetap aktif sampai akhir periode billing.
        Setelah periode berakhir, subscription di-downgrade ke FREE.
      operationId: cancelSubscription
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Subscription berhasil dibatalkan
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                            example: "Subscription dibatalkan. Akses aktif hingga 2026-05-27."
                          effective_until:
                            type: string
                            format: date-time
                            example: "2026-05-27T00:00:00Z"
        '400':
          description: Tidak ada subscription aktif yang dapat dibatalkan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /billing/invoices:
    get:
      tags: [Billing]
      summary: Riwayat pembayaran
      operationId: listMyInvoices
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Riwayat invoice
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Invoice'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /billing/webhook/midtrans:
    post:
      tags: [Billing]
      summary: Midtrans payment notification webhook
      description: |
        Endpoint untuk menerima notifikasi pembayaran dari Midtrans server.
        Tidak memerlukan JWT auth. Verifikasi dilakukan via signature_key di payload.
        Rate limit khusus: 100 req / menit / IP.
      operationId: midtransWebhookHandler
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MidtransWebhookPayload'
      responses:
        '200':
          description: Webhook berhasil diproses
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "OK"
        '400':
          description: Signature verification gagal atau payload tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

